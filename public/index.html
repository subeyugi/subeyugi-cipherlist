<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>D1 Sample</title>
</head>
<body>
  <h1>Users</h1>
  <ul id="list"></ul>

  <script>
    async function loadUsers() {
      const res = await fetch('/api/users');
      const users = await res.json();

      const list = document.getElementById('list');

      users.forEach(user => {
        const li = document.createElement('li');
        li.textContent = user.name;
        list.appendChild(li);
      });
    }

    loadUsers();
  </script>
</body>
</html>
